<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ArchivE</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="app">
            <!-- ── Top: Config bar ──────────────────────────────── -->
            <div class="config-bar">
                <div class="config-field config-field--grow">
                    <label class="field-label" for="outputPath"
                        >Destination</label
                    >
                    <div class="input-group">
                        <input
                            type="text"
                            id="outputPath"
                            class="input input--flex input--mono"
                            autocomplete="off"
                            spellcheck="false"
                        />
                        <select id="extSelect" class="select">
                            <option value="zip">.zip</option>
                            <option value="tar">.tar</option>
                            <option value="tar.gz">.tar.gz</option>
                        </select>
                        <button
                            id="btnSelectOutput"
                            class="btn btn--secondary btn--icon"
                            title="Browse for save location"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="14"
                                height="14"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M3 3h6l2 3h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel-divider"></div>

            <!-- ── Bottom: File area ───────────────────────────── -->
            <main class="workspace">
                <!-- File list panel -->
                <section class="file-panel">
                    <div class="file-panel-header">
                        <span class="file-panel-title">Selected Files</span>
                        <span class="file-badge" id="fileCount">0 files</span>
                    </div>

                    <div class="file-list-wrapper">
                        <ul id="fileList">
                            <li class="placeholder">
                                <!-- <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="28"
                                    height="28"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    style="margin-bottom: 8px; opacity: 0.35"
                                >
                                    <path
                                        d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                                    />
                                    <polyline points="14 2 14 8 20 8" />
                                    <line x1="12" y1="18" x2="12" y2="12" />
                                    <line x1="9" y1="15" x2="15" y2="15" />
                                </svg>
                                <span>Drop files here or use Add Files</span> -->
                            </li>
                        </ul>
                    </div>
                </section>

                <!-- Action buttons sidebar -->
                <aside class="actions-sidebar">
                    <button
                        id="btnAddFiles"
                        class="btn btn--secondary btn--full"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="13"
                            height="13"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Add Files
                    </button>
                    <button
                        id="btnRemoveFiles"
                        class="btn btn--danger btn--full"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="13"
                            height="13"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14H6L5 6" />
                            <path d="M10 11v6M14 11v6" />
                            <path d="M9 6V4h6v2" />
                        </svg>
                        Remove Selected
                    </button>
                    <button
                        id="btnArchive"
                        class="btn btn--primary btn--full btn--archive"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polyline points="21 8 21 21 3 21 3 8" />
                            <rect x="1" y="3" width="22" height="5" />
                            <line x1="10" y1="12" x2="14" y2="12" />
                        </svg>
                        <span id="btnArchiveText">Create Archive</span>
                    </button>
                </aside>
            </main>

            <!-- ── Status bar ──────────────────────────────────── -->
            <div class="status-bar" id="statusBar">
                <span id="statusMessage"></span>
            </div>
        </div>

        <script src="renderer.js"></script>
    </body>
</html>
